- name: Deploy latest passing commit
  hosts: web_server
  gather_facts: true
  vars:
    new_server_version: 0.9.18

  tasks: 
    - name: Deploy new image for main server
      kubernetes.core.k8s:
        state: present
        kind: Deployment
        name: archie-main-svr
        namespace: archie
        wait: true
        validate_certs: false
        # k3s puts its kubeconfig in a different place than
        # mainline K8s
        kubeconfig: /etc/rancher/k3s/k3s.yaml
        definition:
          spec:
            strategy: 
              type: RollingUpdate
              rollingUpdate:
                maxUnavailable: 2
                maxSurge: 1
            template:
              spec:
                containers:
                - name: archie-svr
                  image: "lmr97/archie-svr:{{ new_server_version }}"
                  imagePullPolicy: Always
        
